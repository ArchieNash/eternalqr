{% extends "base.html" %}
{% block title %}Create Account — EternalQR{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="font-serif text-3xl text-stone-100 mb-2">Create your account</h1>
      <p class="text-stone-500 text-sm">Start building a memorial in minutes.</p>
    </div>

    <div class="bg-stone-900 border border-stone-800 rounded-2xl p-8">
      <form method="POST" action="{{ url_for('auth.register') }}{% if invite %}?invite={{ invite }}{% endif %}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="space-y-5">
          <div>
            <label for="name" class="block text-sm text-stone-300 mb-1.5">Your name</label>
            <input type="text" id="name" name="name" required
              class="w-full bg-stone-800 border border-stone-700 text-stone-100 placeholder-stone-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500/30 transition"
              placeholder="Jane Smith" autocomplete="name" />
          </div>

          <div>
            <label for="email" class="block text-sm text-stone-300 mb-1.5">Email address</label>
            <input type="email" id="email" name="email" required
              class="w-full bg-stone-800 border border-stone-700 text-stone-100 placeholder-stone-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500/30 transition"
              placeholder="you@example.com" autocomplete="email" />
          </div>

          <div>
            <label for="password" class="block text-sm text-stone-300 mb-1.5">Password</label>
            <input type="password" id="password" name="password" required minlength="8"
              class="w-full bg-stone-800 border border-stone-700 text-stone-100 placeholder-stone-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500/30 transition"
              placeholder="At least 8 characters" autocomplete="new-password" />
          </div>

          <div>
            <label for="confirm_password" class="block text-sm text-stone-300 mb-1.5">Confirm password</label>
            <input type="password" id="confirm_password" name="confirm_password" required
              class="w-full bg-stone-800 border border-stone-700 text-stone-100 placeholder-stone-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500/30 transition"
              placeholder="Repeat your password" autocomplete="new-password" />
          </div>
        </div>

        <button type="submit"
          class="mt-7 w-full bg-amber-600 hover:bg-amber-500 text-white font-semibold py-3 rounded-lg transition text-sm shadow-lg shadow-amber-900/20">
          Create Account
        </button>
      </form>
    </div>

    <p class="text-center text-stone-500 text-sm mt-6">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" class="text-amber-400 hover:text-amber-300 transition">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
