{% extends "base.html" %}
{% block title %}Check your email — ArchiveHumanity{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-24 text-center">
  <div class="text-5xl mb-6">✉️</div>
  <h1 class="font-serif text-3xl text-stone-100 mb-3">Check your inbox</h1>
  <p class="text-stone-400 mb-2">We sent a verification link to:</p>
  <p class="text-stone-200 font-medium mb-8">{{ email }}</p>
  <p class="text-stone-500 text-sm mb-8">Click the link in the email to activate your account. It expires in 24 hours.</p>

  <div class="border-t border-stone-800 pt-6">
    <p class="text-stone-500 text-sm mb-3">Didn't receive it?</p>
    <form method="POST" action="{{ url_for('auth.resend_verification_page') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="email" value="{{ email }}">
      <button type="submit"
        class="text-amber-500 hover:text-amber-400 text-sm font-medium transition">
        Resend verification email
      </button>
    </form>
  </div>
</div>
{% endblock %}
