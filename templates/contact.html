{% extends "base.html" %}
{% block title %}Contact — ArchiveHumanity{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-20">

  <h1 class="font-serif text-4xl text-stone-100 mb-3">Get in touch</h1>
  <p class="text-stone-400 mb-10">Have a question or feedback? We'd love to hear from you.</p>

  <form method="POST" action="{{ url_for('main.contact') }}" class="space-y-5">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div>
      <label class="block text-sm text-stone-400 mb-1.5" for="name">Name</label>
      <input type="text" id="name" name="name" required
        class="w-full bg-stone-900 border border-stone-700 text-stone-100 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-amber-500 transition placeholder-stone-600"
        placeholder="Your name" />
    </div>

    <div>
      <label class="block text-sm text-stone-400 mb-1.5" for="email">Email</label>
      <input type="email" id="email" name="email" required
        class="w-full bg-stone-900 border border-stone-700 text-stone-100 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-amber-500 transition placeholder-stone-600"
        placeholder="you@example.com" />
    </div>

    <div>
      <label class="block text-sm text-stone-400 mb-1.5" for="message">Message</label>
      <textarea id="message" name="message" required rows="6"
        class="w-full bg-stone-900 border border-stone-700 text-stone-100 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-amber-500 transition placeholder-stone-600 resize-none"
        placeholder="What's on your mind?"></textarea>
    </div>

    <button type="submit"
      class="w-full bg-amber-600 hover:bg-amber-500 text-white font-semibold py-3 rounded-lg transition">
      Send message
    </button>
  </form>

</div>
{% endblock %}
